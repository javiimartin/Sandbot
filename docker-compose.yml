# version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: robot-db
    environment:
      POSTGRES_USER: woz
      POSTGRES_PASSWORD: woz
      POSTGRES_DB: woz
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woz"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./robot_backend
    container_name: robot-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://woz:woz@db:5432/woz
    volumes:
      - ./robot_backend:/app
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./robot-frontend
    container_name: robot-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./robot-frontend:/app
      - /app/node_modules
    # environment:
    #   - VITE_API_BASE_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata: